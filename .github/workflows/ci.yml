name: Python CI

on:
  push:
  pull_request:

env:
  PYTHON_VERSION: "3.14"

jobs:
  lint-and-basic-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Run unit tests
        run: |
          uv run python -m pytest tests/ -v --cov=src/docling_japanese_books --cov-report=xml

      - name: Test CLI help commands
        run: |
          uv run docling-japanese-books --help
          uv run docling-japanese-books download --help
          uv run docling-japanese-books process --help
          uv run docling-japanese-books search --help

      - name: Upload coverage reports
        uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457 # v3.1.6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
